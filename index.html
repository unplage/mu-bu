<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#4f8cf0" />
  <meta name="description" content="Mubu-Lite: 幕布风格的 PWA 思维导图与大纲编辑器,本地存储,可离线使用。" />
  <title>Mubu-Lite 思维导图</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-logo">M</span>
          <span class="brand-name">Mubu-Lite</span>
        </div>
        <button id="closeSidebar" class="icon-btn only-mobile" title="收起">✕</button>
      </div>
      <div class="sidebar-actions">
        <button id="newDoc" class="btn btn-primary btn-block">+ 新建文档</button>
        <label class="btn btn-ghost btn-block">
          导入文件
          <input id="importFile" type="file" accept=".json,.opml,.xml" hidden />
        </label>
      </div>
      <div class="sidebar-search">
        <input id="searchDocs" type="search" placeholder="搜索文档…" />
      </div>
      <ul id="docList" class="doc-list"></ul>
      <div class="sidebar-footer">
        <span class="hint">数据保存在本地浏览器</span>
      </div>
    </aside>

    <!-- 主区 -->
    <main id="main" class="main">
      <header class="toolbar">
        <button id="openSidebar" class="icon-btn" title="文档列表">☰</button>
        <input id="docTitle" class="doc-title" type="text" placeholder="未命名文档" />
        <div class="toolbar-spacer"></div>
        <div class="view-switch">
          <button id="viewOutline" class="seg-btn active">大纲</button>
          <button id="viewMindmap" class="seg-btn">思维导图</button>
        </div>
        <div class="toolbar-divider"></div>
        <button id="colorBtn" class="icon-btn" title="节点配色" disabled>🎨</button>
        <button id="collapseAll" class="icon-btn" title="全部折叠">⇲</button>
        <button id="expandAll" class="icon-btn" title="全部展开">⇱</button>
        <div class="toolbar-divider"></div>
        <button id="exportBtn" class="icon-btn" title="导出">⬇</button>
        <button id="shareBtn" class="icon-btn" title="分享">↗</button>
        <button id="deleteDoc" class="icon-btn danger" title="删除文档">🗑</button>
      </header>

      <!-- 大纲视图 -->
      <section id="outlineView" class="view view-outline">
        <div id="outlineTree" class="outline-tree" tabindex="0"></div>
      </section>

      <!-- 思维导图视图 -->
      <section id="mindmapView" class="view view-mindmap">
        <div id="mindmapCanvas" class="mindmap-canvas"></div>
        <div class="mm-hint" id="mmHint">Tab 添加子节点 · Enter 添加兄弟 · 双击编辑 · Shift+点击折叠 · 拖拽平移 · 滚轮缩放</div>
        <div class="mm-status" id="mmStatus">0 节点</div>
        <div class="mm-toolbar">
          <button id="mmAddChild" class="mm-btn" title="添加子节点 (Tab)">＋子</button>
          <button id="mmAddSibling" class="mm-btn" title="添加兄弟 (Enter)">＋兄</button>
          <button id="mmDelete" class="mm-btn" title="删除 (Backspace)">🗑</button>
          <div class="mm-divider"></div>
          <button id="mmFontSize" class="mm-btn" title="字号">字号</button>
          <div class="mm-divider"></div>
          <button id="mmZoomIn" class="mm-btn">＋</button>
          <button id="mmZoomOut" class="mm-btn">－</button>
          <button id="mmZoomFit" class="mm-btn">⤢</button>
          <button id="mmZoomReset" class="mm-btn">1:1</button>
        </div>
        <div id="fontSizePopover" class="popover" hidden>
          <div class="popover-title">字号</div>
          <div class="font-size-grid">
            <button class="font-size-item" data-size="S">小 (12px)</button>
            <button class="font-size-item" data-size="M">中 (14px)</button>
            <button class="font-size-item" data-size="L">大 (18px)</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 配色浮层 -->
  <div id="colorPopover" class="popover" hidden>
    <div class="popover-title">节点配色</div>
    <div class="color-grid" id="colorGrid"></div>
    <button id="colorClear" class="btn btn-ghost btn-block">清除颜色</button>
  </div>

  <!-- 导出弹窗 -->
  <div id="exportModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>导出</h3>
        <button class="icon-btn" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div class="export-grid">
          <button class="export-item" data-export="json">
            <span class="export-icon">{ }</span>
            <span class="export-name">JSON 备份</span>
            <span class="export-desc">完整可重新导入</span>
          </button>
          <button class="export-item" data-export="markdown">
            <span class="export-icon">M↓</span>
            <span class="export-name">Markdown</span>
            <span class="export-desc">层级列表</span>
          </button>
          <button class="export-item" data-export="opml">
            <span class="export-icon">OPML</span>
            <span class="export-name">OPML</span>
            <span class="export-desc">兼容其它大纲工具</span>
          </button>
          <button class="export-item" data-export="png">
            <span class="export-icon">🖼</span>
            <span class="export-name">PNG 图片</span>
            <span class="export-desc">导出思维导图</span>
          </button>
          <button class="export-item" data-export="svg">
            <span class="export-icon">S</span>
            <span class="export-name">SVG 矢量图</span>
            <span class="export-desc">无损缩放</span>
          </button>
          <button class="export-item" data-export="txt">
            <span class="export-icon">TXT</span>
            <span class="export-name">纯文本</span>
            <span class="export-desc">缩进列表</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 分享弹窗 -->
  <div id="shareModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>分享文档</h3>
        <button class="icon-btn" data-close>✕</button>
      </div>
      <div class="modal-body">
        <p class="share-tip">生成只读分享链接(数据压缩写入链接,无需服务器):</p>
        <div class="share-row">
          <input id="shareLink" type="text" readonly />
          <button id="copyShare" class="btn btn-primary">复制</button>
        </div>
        <p class="share-note" id="shareNote"></p>
        <div class="share-divider"><span>或</span></div>
        <button id="shareDownload" class="btn btn-ghost btn-block">下载 .mubu 文件分享</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
